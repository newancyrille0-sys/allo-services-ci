<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50" width="200" height="50">
  <defs>
    <linearGradient id="primaryGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#004150"/>
      <stop offset="100%" style="stop-color:#005a6e"/>
    </linearGradient>
    <linearGradient id="orangeGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FD7613"/>
      <stop offset="100%" style="stop-color:#ff8c3a"/>
    </linearGradient>
  </defs>
  
  <!-- Logo Icon - Speech Bubble with Phone -->
  <g transform="translate(2, 5)">
    <!-- Speech Bubble -->
    <path d="M6 5 
             Q6 2 10 2 
             L32 2 
             Q36 2 36 5 
             L36 26 
             Q36 29 32 29 
             L18 29 
             L12 36 
             L12 29 
             L10 29 
             Q6 29 6 26 
             Z" 
          fill="url(#primaryGrad)"/>
    
    <!-- Phone Icon -->
    <rect x="17" y="7" width="8" height="14" rx="1.5" fill="white"/>
    <rect x="18.5" y="9" width="5" height="8" rx="0.5" fill="#004150" opacity="0.2"/>
    <circle cx="21" cy="19" r="1" fill="#004150" opacity="0.3"/>
    
    <!-- Notification dot -->
    <circle cx="32" cy="8" r="4" fill="url(#orangeGrad)"/>
  </g>
  
  <!-- ALLÔ Text -->
  <text x="48" y="26" 
        font-family="Manrope, Arial, sans-serif" 
        font-size="22" 
        font-weight="800" 
        fill="#004150"
        letter-spacing="1">ALLÔ</text>
  
  <!-- SERVICES Text -->
  <text x="118" y="26" 
        font-family="Manrope, Arial, sans-serif" 
        font-size="22" 
        font-weight="300" 
        fill="#FD7613"
        letter-spacing="1">SERVICES</text>
</svg>